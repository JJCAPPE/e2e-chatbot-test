bundle:
  name: bmed-move-interface

variables:
  serving_endpoint_name:
    description: "Nome del Model Serving endpoint dell'agente MOVE"
    default: "bmed-move-agent"
  database_instance_name:
    description: "Base name of the Lakebase database instance"
    default: "bmed-move-chat-history"
  resource_name_suffix:
    description: "Suffix for resource names (app/lakebase instance names etc). Helpful for avoiding name collisions if multiple users deploy this app to the same workspace"

resources:
  database_instances:
    # TODO (optional): Uncomment the database resource below to enable persistent chat history
    # chatbot_lakebase:
    #   name: ${var.database_instance_name}-${var.resource_name_suffix}
    #   capacity: CU_1

  apps:
    bmed_move_interface:
      name: bmed-move-interface-${var.resource_name_suffix}
      description: "Interfaccia chat MOVE per interrogare l'agente BMED su Databricks"
      source_code_path: .
      resources:
        - name: serving-endpoint
          description: "Model Serving endpoint Databricks dell'agente MOVE"
          serving_endpoint:
            name: ${var.serving_endpoint_name}
            permission: CAN_QUERY
        # TODO (optional): Uncomment the database resource below to bind the app to the database instance above
        # and enable persistent chat history
        # - name: database
        #   description: "Lakebase database instance for the chat app"
        #   database:
        #     database_name: databricks_postgres
        #     instance_name: ${resources.database_instances.chatbot_lakebase.name}
        #     permission: CAN_CONNECT_AND_CREATE
        # TODO (optional): Uncomment the experiment resource below to enable the feedback widget.
        # First run `npx tsx scripts/get-experiment-id.ts --endpoint <your-endpoint-name>` to find the experiment ID.
        # Note: enabling feedback also requires a database (uncomment both TODO database blocks above).
        # - name: experiment
        #   description: "MLflow experiment for collecting user feedback"
        #   experiment:
        #     experiment_id: "your-experiment-id"
        #     permission: CAN_EDIT

targets:
  dev:
    mode: development
    default: true
    variables:
      resource_name_suffix: dev-${workspace.current_user.domain_friendly_name}

  staging:
    mode: production
    variables:
      resource_name_suffix: "staging"

  prod:
    mode: production
    variables:
      resource_name_suffix: "prod"
